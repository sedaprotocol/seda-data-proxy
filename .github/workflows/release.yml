name: 🚀 Release
on:
  push:
    tags: ["*"]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/sedaprotocol/seda-data-proxy

jobs:
  changelog:
    name: 🛠️ Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 📝 Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: false
          skip-commit: true
          skip-tag: true
          skip-git-pull: true
          git-push: false


  build_and_push_docker_images:
    name: 🐳 Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Verify package.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r .version workspace/data-proxy/package.json)
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME != package.json version $PKG"
            exit 1
          fi

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .build/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_ARCH=bun-linux-x64

  create_release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [changelog, build_and_push_docker_images]
    steps:
      - name: 🎉 Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          draft: ${{ contains(github.ref_name, 'dev') }}
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          allowUpdates: true
          generateReleaseNotes: true
          body: ${{ needs.build.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ github.sha }}
          tag: ${{ github.ref_name }} 
