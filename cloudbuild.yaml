# Multi-architecture build configuration for SEDA Data Proxy
# Triggered on tag pushes to build AMD64 and ARM64 images

substitutions:
  _REGISTRY: "us-central1-docker.pkg.dev"
  _REPO: "manual-dp-build-repo"                    #FIXME: Will change to a stable Artifact Registry repo once done with the testing!
  _PROJECT: "perf-testing-infra-af6aff"            #FIXME: We'll have separate project just for builds, so that it is always in a predictable spot.
  _IMAGE_NAME: "seda-data-proxy"

# Required for multi-arch builds
options:
  machineType: 'E2_HIGHCPU_8'
  dynamic_substitutions: true
  logging: CLOUD_LOGGING_ONLY # We don't need audit logs for this build.

steps:
# ─────────────────────────────────────────────
# Step 1: Configure Docker authentication
# ─────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'auth'
  args:
    - 'auth'
    - 'configure-docker'
    - '${_REGISTRY}'
    - '--quiet'

# ─────────────────────────────────────────────
# Step 2: Set up QEMU for multi-architecture builds
# ─────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/docker'
  id: 'setup-qemu'
  args:
    - 'run'
    - '--privileged'
    - 'multiarch/qemu-user-static'
    - '--reset'
    - '-p'
    - 'yes'

# ─────────────────────────────────────────────
# Step 3: Build and push AMD64 image
# ─────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-amd64'
  args:
    - 'build'
    - '--build-arg'
    - 'TARGET_ARCH=bun-linux-x64-modern'
    - '-t'
    - '${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-x64-modern'
    - '-f'
    - '.build/docker/Dockerfile'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-amd64'
  waitFor: ['auth', 'build-amd64']
  args:
    - 'push'
    - '${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-x64-modern'

# ─────────────────────────────────────────────
# Step 4: Build and push ARM64 image
# ─────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-arm64'
  args:
    - 'build'
    - '--platform'
    - 'linux/arm64'
    - '--build-arg'
    - 'TARGET_ARCH=bun-linux-arm64'
    - '-t'
    - '${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-arm64'
    - '-f'
    - '.build/docker/Dockerfile'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-arm64'
  waitFor: ['auth', 'build-arm64']
  args:
    - 'push'
    - '${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-arm64'

# ─────────────────────────────────────────────
# Step 5: Create and push manifest list
# ─────────────────────────────────────────────
- name: 'gcr.io/cloud-builders/docker'
  id: 'create-manifest'
  waitFor: ['push-amd64', 'push-arm64']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker manifest create \
        ${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME} \
        --amend ${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-x64-modern \
        --amend ${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-arm64
      docker manifest push ${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}

# ─────────────────────────────────────────────
# Step 6: Create GitHub Release with Changelog
# ─────────────────────────────────────────────
- name: 'node:18'
  id: 'create-release'
  waitFor: ['create-manifest']
  secretEnv: ['GITHUB_TOKEN']
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      set -ex  # Enable debugging and exit on error
      
      # Install GitHub CLI and dependencies
      type -p curl >/dev/null || (apt-get update && apt-get install -y curl)
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
        && chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && apt-get update \
        && apt-get install -y gh jq

      # Configure GitHub CLI
      echo "Configuring GitHub CLI..."
      TOKEN="$$GITHUB_TOKEN"
      unset GITHUB_TOKEN
      echo "$$TOKEN" | gh auth login --with-token
      gh auth status

      # Create release notes file
      cat > release_notes.md << 'EOL'
      # Release ${TAG_NAME}

      ## 🐳 Docker Images
      
      ### Multi-Architecture Image (Recommended)
      [![Docker Image](https://img.shields.io/badge/docker-pull%20image-blue?logo=docker&logoColor=white)](${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME})
      ```bash
      docker pull ${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}
      ```

      ### Architecture-Specific Images
      | Architecture | Image URL | Size |
      |-------------|-----------|------|
      | AMD64 | [`${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-x64-modern`](${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-x64-modern) | ![Image Size](https://img.shields.io/docker/image-size/${_PROJECT}/${_REPO}/${_IMAGE_NAME}/${TAG_NAME}-bun-linux-x64-modern?label=size&logo=docker) |
      | ARM64 | [`${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-arm64`](${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-arm64) | ![Image Size](https://img.shields.io/docker/image-size/${_PROJECT}/${_REPO}/${_IMAGE_NAME}/${TAG_NAME}-bun-linux-arm64?label=size&logo=docker) |

      ## 📦 Installation

      ### Using Docker CLI
      ```bash
      # With environment variable
      docker run -d \
        --name seda-data-proxy \
        -p 5384:5384 \
        -v /app/config.json:/app/config.json:ro \
        -e SEDA_DATA_PROXY_PRIVATE_KEY=$SEDA_DATA_PROXY_PRIVATE_KEY \
        ${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}
      ```

      ## 🔄 What's Changed

      <details>
      <summary>Click to expand changelog</summary>
      </details>

      ## 👥 Contributors

      ${CONTRIBUTORS_PLACEHOLDER}

      EOL

      # Get commit history since last release
      LAST_TAG=$(gh release list --repo "sedaprotocol/seda-data-proxy" --limit 1 --exclude "${TAG_NAME}" | awk '{print $1}')
      
      # Generate feature/fix/maintenance sections
      FEATURES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^feat" || echo "No new features")
      FIXES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^fix" || echo "No bug fixes")
      MAINTENANCE=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --grep="^chore\|^refactor\|^docs\|^test" || echo "No maintenance updates")
      
      # Get contributors
      CONTRIBUTORS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- [@%an](https://github.com/%an)" | sort -u)

      # Replace placeholders
      sed -i "s|\${FEATURES_PLACEHOLDER}|$FEATURES|g" release_notes.md
      sed -i "s|\${FIXES_PLACEHOLDER}|$FIXES|g" release_notes.md
      sed -i "s|\${MAINTENANCE_PLACEHOLDER}|$MAINTENANCE|g" release_notes.md
      sed -i "s|\${CONTRIBUTORS_PLACEHOLDER}|$CONTRIBUTORS|g" release_notes.md

      # Create GitHub release
      echo "Creating GitHub release ${TAG_NAME}..."
      gh release create "${TAG_NAME}" \
        --repo "sedaprotocol/seda-data-proxy" \
        --title "Release ${TAG_NAME}" \
        --notes-file release_notes.md \
        --generate-notes \
        --verify-tag

      # Verify release was created
      echo "Verifying release..."
      gh release view "${TAG_NAME}" --repo "sedaprotocol/seda-data-proxy" --json url,tagName,name | jq .

# ─────────────────────────────────────────────
# Configure secrets
# ─────────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT}/secrets/manual-github-token/versions/latest
      env: 'GITHUB_TOKEN'

# ─────────────────────────────────────────────
# Set timeout and artifacts
# ─────────────────────────────────────────────
timeout: '3600s'
images:
  - '${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-x64-modern'
  - '${_REGISTRY}/${_PROJECT}/${_REPO}/${_IMAGE_NAME}:${TAG_NAME}-bun-linux-arm64' 